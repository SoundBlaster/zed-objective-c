name: Objective-C extension

on:
  push:
    paths:
      - "Cargo.lock"
      - "Cargo.toml"
      - "extension.toml"
      - "rust-toolchain.toml"
      - "languages/**"
      - "scripts/**"
      - "snippets/**"
      - "src/**"
      - "test/**"
      - ".github/workflows/objective-c-extension.yml"
  pull_request:
    paths:
      - "Cargo.lock"
      - "Cargo.toml"
      - "extension.toml"
      - "rust-toolchain.toml"
      - "languages/**"
      - "scripts/**"
      - "snippets/**"
      - "src/**"
      - "test/**"
      - ".github/workflows/objective-c-extension.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
          targets: wasm32-wasip2

      - name: Install Tree-sitter CLI
        run: cargo install tree-sitter-cli --version 0.24.7 --locked

      - name: Install TOML parser for older Python
        run: python3 -m pip install tomli

      - name: Check shell scripts
        run: bash -n scripts/*.sh

      - name: Validate extension
        run: scripts/test-extension.sh

      - name: Check Rust formatting
        run: cargo fmt --check

      - name: Build Zed extension for WASI
        run: cargo check --locked --target wasm32-wasip2
